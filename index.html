Хочу уволиться`,description:`Сроки, заявление и окончательный расчёт`,time:`Около 15 минут`}]},{id:`housing`,title:`Жильё и ЖКХ`,description:`Аренда, квитанции, обращения`,Icon:D,color:`green`,situations:[{id:`rent-flat`,title:`Снимаю квартиру`,description:`Проверка собственника, договора и залога`,time:`Около 20 минут`,available:!0},{id:`first-bill`,title:`Первая квитанция ЖКХ`,description:`Начисления, показания и сроки оплаты`,time:`Около 12 минут`},{id:`wrong-bill`,title:`Ошибка в квитанции`,description:`Как проверить начисление и подать заявление`,time:`Около 15 минут`}]},{id:`documents`,title:`Документы`,description:`Паспорт, регистрация, замена`,Icon:le,color:`teal`,situations:[{id:`lost-passport`,title:`Потерялся паспорт`,description:`Что сделать сегодня и какие документы собрать`,time:`Около 20 минут`,available:!0},{id:`registration`,title:`Нужна регистрация`,description:`Временная регистрация по месту пребывания`,time:`Около 15 минут`}]},{id:`money`,title:`Деньги`,description:`Налоги, кредиты, безопасность`,Icon:te,color:`amber`,situations:[{id:`tax-deduction`,title:`Хочу оформить вычет`,description:`Какие расходы подходят и что подготовить`,time:`Около 20 минут`},{id:`bank-fraud`,title:`Подозрительный звонок из банка`,description:`Как защитить деньги и данные`,time:`Около 7 минут`,available:!0}]},{id:`family`,title:`Семья и брак`,description:`Заявление, фамилия, документы`,Icon:de,color:`coral`,situations:[{id:`marriage`,title:`Планируем брак`,description:`Подача заявления и необходимые документы`,time:`Около 15 минут`,available:!0},{id:`surname`,title:`Меняю фамилию`,description:`Какие документы заменить и в какие сроки`,time:`Около 20 минут`}]},{id:`purchases`,title:`Покупки и услуги`,description:`Возврат, гарантия, претензия`,Icon:be,color:`blue`,situations:[{id:`return`,title:`Хочу вернуть товар`,description:`Сроки, заявление и доказательства покупки`,time:`Около 12 минут`,available:!0}]}],Te={"first-job":{id:`first-job`,categoryId:`work`,title:`Первая работа`,description:`Разберёмся, что проверить до выхода на работу.`,time:`Около 25 минут`,questions:[{id:`contract`,title:`Вам уже прислали трудовой договор?`,helper:`Это поможет понять, с какого шага начать.`,options:[{id:`have`,label:`Да, договор у меня`},{id:`waiting`,label:`Пока нет`},{id:`informal`,label:`Предлагают работать без договора`,warning:!0}]},{id:`salary`,title:`В договоре указана точная зарплата?`,helper:`Проверьте сумму до вычета налогов и условия премии.`,options:[{id:`exact`,label:`Да, указана точная сумма`},{id:`unclear`,label:`Есть только оклад или непонятная формулировка`},{id:`verbal`,label:`Зарплату назвали только устно`,warning:!0}]},{id:`schedule`,title:`График и испытательный срок понятны?`,helper:`Они должны совпадать с тем, что обсуждали на собеседовании.`,options:[{id:`clear`,label:`Да, всё понятно`},{id:`partly`,label:`Нужно перепроверить детали`},{id:`missing`,label:`Эти условия не указаны`,warning:!0}]}],benefits:[{title:`Проверим условия`,text:`Должность, зарплату и график`},{title:`Соберём документы`,text:`Только то, что действительно нужно`},{title:`Отметим сроки`,text:`Первая выплата и испытательный срок`}],steps:[{id:1,title:`Проверьте работодателя`,duration:`Около 5 минут`,summary:`Убедитесь, что компания существует и данные в вакансии совпадают.`,action:`Найдите полное название и ИНН работодателя. Сверьте юридическое лицо, адрес и вид деятельности с информацией из вакансии.`,needs:[`Название компании`,`ИНН или ссылка на вакансию`],warning:`Работодатель просит заплатить за трудоустройство или обучение.`,source:`ФНС России: сервис «Прозрачный бизнес»`,sourceUrl:`https://pb.nalog.ru/`},{id:2,title:`Изучите трудовой договор`,duration:`Около 10 минут`,summary:`Проверьте должность, зарплату, график и испытательный срок.`,action:`Сверьте должность и обязанности с вакансией. Найдите точную сумму зарплаты, даты выплат, режим работы и продолжительность испытательного срока.`,needs:[`Проект договора`,`Текст вакансии`],warning:`Зарплата или обязательные выплаты указаны только устно.`,source:`Онлайнинспекция.рф: трудовой договор`,sourceUrl:`https://xn--80akibcicpdbetz7e2g.xn--p1ai/reminder/93`},{id:3,title:`Подготовьте документы`,duration:`Около 4 минут`,summary:`Соберите только те документы, которые действительно нужны.`,action:`Подготовьте паспорт, СНИЛС и сведения о трудовой деятельности. Передавайте оригиналы только для проверки и не оставляйте паспорт работодателю.`,needs:[`Паспорт`,`СНИЛС`,`Трудовая книжка или сведения`],warning:`У вас требуют оставить оригинал паспорта или оплатить оформление.`,source:`Онлайнинспекция.рф: документы при трудоустройстве`,sourceUrl:`https://xn--80akibcicpdbetz7e2g.xn--p1ai/requirements/one/16`},{id:4,title:`Зафиксируйте условия`,duration:`Около 3 минут`,summary:`Сохраните экземпляр договора и договорённости.`,action:`Получите подписанный экземпляр договора. Сохраните вакансию и переписку, где обсуждались зарплата, график и формат работы.`,needs:[`Подписанный договор`,`Переписка с работодателем`],warning:`Вам не выдают экземпляр подписанного договора.`,source:`Трудовой кодекс РФ, статья 67`,sourceUrl:`https://pravo.gov.ru/proxy/ips/?docbody=&nd=102074279`},{id:5,title:`Отметьте важные сроки`,duration:`Около 2 минут`,summary:`Сохраните дату первой выплаты и окончания испытательного срока.`,action:`Добавьте напоминание о первой зарплате и дате окончания испытательного срока. Это поможет вовремя заметить нарушение.`,needs:[`Календарь`,`Даты из договора`],warning:`Дата выплаты зарплаты не указана или меняется устно.`,source:`Трудовой кодекс РФ, статья 136`,sourceUrl:`https://pravo.gov.ru/proxy/ips/?docbody=&nd=102074279`},{id:6,title:`Проверьте первую выплату`,duration:`Около 3 минут`,summary:`Сравните сумму и дату выплаты с условиями договора.`,action:`Проверьте расчётный листок, размер выплаты и дату поступления. Если есть расхождения, сначала запросите письменное объяснение.`,needs:[`Расчётный листок`,`Банковская выписка`],warning:`Деньги задержали, а объяснение дают только устно.`,source:`Онлайнинспекция.рф: невыплата заработной платы`,sourceUrl:`https://xn--80akibcicpdbetz7e2g.xn--p1ai/instruction/7`}],completion:[`Договор проверен`,`Документы подготовлены`,`Важные сроки сохранены`]},"rent-flat":{id:`rent-flat`,categoryId:`housing`,title:`Снимаю квартиру`,description:`Проверим собственника, договор, оплату и состояние квартиры до переезда.`,time:`Около 20 минут`,benefits:[{title:`Проверим квартиру`,text:`Кто собственник и есть ли ограничения`},{title:`Разберём договор`,text:`Срок, платежи, залог и условия выезда`},{title:`Зафиксируем передачу`,text:`Состояние жилья, ключи и показания`}],steps:[{id:1,title:`Проверьте собственника`,duration:`Около 4 минут`,summary:`Сверьте паспорт арендодателя с актуальной выпиской ЕГРН.`,action:`Попросите показать паспорт и свежую выписку ЕГРН. Фамилия собственника и адрес квартиры должны совпадать. Если договор подписывает представитель, проверьте нотариальную доверенность.`,needs:[`Паспорт арендодателя`,`Выписка ЕГРН`,`Доверенность при необходимости`],warning:`Человек отказывается подтверждать право собственности или торопит с переводом денег.`,source:`Росреестр: получение сведений из ЕГРН`,sourceUrl:`https://rosreestr.gov.ru/eservices/`},{id:2,title:`Осмотрите квартиру`,duration:`Около 4 минут`,summary:`Зафиксируйте состояние жилья и всё, что остаётся внутри.`,action:`Проверьте сантехнику, окна, технику и мебель. Снимите фото или видео с датой, перечислите дефекты и имущество в акте приёма-передачи.`,needs:[`Телефон с камерой`,`Список имущества`,`Показания счётчиков`],warning:`В договоре написано, что квартира передана без недостатков, хотя они есть.`,source:`Гражданский кодекс РФ: наём жилого помещения`,sourceUrl:`https://pravo.gov.ru/proxy/ips/?docbody=&nd=102033239`},{id:3,title:`Разберите все платежи`,duration:`Около 4 минут`,summary:`Отделите аренду, залог, коммунальные платежи и комиссии.`,action:`Запишите точную сумму аренды, дату оплаты, размер и правила возврата залога. Уточните, кто оплачивает воду, свет, интернет, содержание жилья и возможный ремонт.`,needs:[`Проект договора`,`Последняя квитанция ЖКХ`,`Реквизиты для оплаты`],warning:`Дополнительные платежи называют устно и не включают в договор.`,source:`Гражданский кодекс РФ, глава 35`,sourceUrl:`https://pravo.gov.ru/proxy/ips/?docbody=&nd=102033239`},{id:4,title:`Проверьте договор`,duration:`Около 5 минут`,summary:`Найдите условия проживания, расторжения и возврата залога.`,action:`Сверьте адрес, срок найма, состав жильцов и порядок визитов собственника. Проверьте, за сколько дней можно расторгнуть договор и в каких случаях удерживается залог.`,needs:[`Проект договора`,`Паспортные данные сторон`,`Акт приёма-передачи`],warning:`Собственник может войти в квартиру без предупреждения или выселить вас в любой момент.`,source:`Гражданский кодекс РФ, статьи 671–688`,sourceUrl:`https://pravo.gov.ru/proxy/ips/?docbody=&nd=102033239`},{id:5,title:`Передайте деньги безопасно`,duration:`Около 3 минут`,summary:`Платите после подписания документов и сохраняйте подтверждения.`,action:`Подпишите договор и акт в двух экземплярах. При переводе укажите назначение платежа, а при оплате наличными получите расписку с суммой, датой и подписью.`,needs:[`Подписанный договор`,`Акт`,`Расписка или чек перевода`],warning:`Просят внести залог до просмотра квартиры или перевести деньги третьему лицу.`,source:`Гражданский кодекс РФ: исполнение обязательств`,sourceUrl:`https://pravo.gov.ru/proxy/ips/?docbody=&nd=102033239`}],completion:[`Собственник проверен`,`Договор разобран`,`Передача квартиры зафиксирована`]},"lost-passport":{id:`lost-passport`,categoryId:`documents`,title:`Потерялся паспорт`,description:`Снизим риск злоупотреблений и подготовим замену документа.`,time:`Около 20 минут`,benefits:[{title:`Зафиксируем утрату`,text:`Чтобы старый паспорт признали недействительным`},{title:`Соберём документы`,text:`Без лишних поездок и повторных заявлений`},{title:`Получим замену`,text:`Через МВД или удобный центр обслуживания`}],steps:[{id:1,title:`Восстановите обстоятельства`,duration:`Около 2 минут`,summary:`Запишите, где и когда вы в последний раз видели паспорт.`,action:`Проверьте последние места и вещи, но не откладывайте заявление, если паспорт действительно утрачен. Запишите примерное время, место и обстоятельства.`,needs:[`Заметка с датой и местом`,`Копия паспорта, если сохранилась`],warning:`Кто-то предлагает вернуть паспорт за перевод денег или просит назвать банковские коды.`,source:`МВД России: выдача и замена паспорта`,sourceUrl:`https://xn--b1aew.xn--p1ai/dejatelnost/emvd/guvm/выдача-паспорта-гражданина-рф`},{id:2,title:`Заявите об утрате`,duration:`Около 4 минут`,summary:`Сообщите об утрате в подразделение МВД как можно быстрее.`,action:`Обратитесь в подразделение по вопросам миграции МВД и подайте письменное заявление об утрате. При возможной краже отдельно сообщите об обстоятельствах сотруднику полиции.`,needs:[`Описание обстоятельств`,`Контакты для связи`],warning:`Не передавайте заявление или деньги посредникам, которые обещают «решить вопрос без МВД».`,source:`МВД России: паспорт гражданина РФ`,sourceUrl:`https://xn--b1aew.xn--p1ai/dejatelnost/emvd/guvm/выдача-паспорта-гражданина-рф`},{id:3,title:`Подготовьте замену`,duration:`Около 5 минут`,summary:`Соберите заявление, фотографии и документы для обязательных отметок.`,action:`Подготовьте фотографии и документы, необходимые для отметок в новом паспорте. Актуальный перечень и размер госпошлины проверьте непосредственно перед подачей.`,needs:[`Фотографии`,`Документы для отметок`,`Реквизиты госпошлины`],warning:`Вам предлагают оплатить госпошлину по реквизитам из сообщения или неофициального сайта.`,source:`Госуслуги: замена паспорта гражданина РФ`,sourceUrl:`https://www.gosuslugi.ru/600101/1/form`},{id:4,title:`Получите временный документ`,duration:`Около 3 минут`,summary:`При необходимости запросите временное удостоверение личности.`,action:`Если документ нужен до выдачи нового паспорта, уточните возможность получить временное удостоверение личности при подаче заявления.`,needs:[`Фотография при необходимости`,`Подтверждение принятия заявления`],warning:`Справку о приёме заявления выдают без номера или просят оставить единственный экземпляр.`,source:`МВД России: государственная услуга по выдаче паспорта`,sourceUrl:`https://xn--b1aew.xn--p1ai/dejatelnost/emvd/guvm/выдача-паспорта-гражданина-рф`},{id:5,title:`Защитите остальные данные`,duration:`Около 6 минут`,summary:`Проверьте финансовые сервисы и обновите данные после получения паспорта.`,action:`Предупредите банк, если вместе с паспортом пропали карты или телефон. Следите за уведомлениями и кредитной историей. После получения нового паспорта обновите данные там, где это требуется.`,needs:[`Доступ к банку`,`Госуслуги`,`Список важных сервисов`],warning:`Появились неизвестные заявки, договоры или уведомления о входе в аккаунты.`,source:`Банк России: как противостоять финансовому мошенничеству`,sourceUrl:`https://cbr.ru/information_security/pmp/`}],completion:[`Утрата зафиксирована`,`Документы на замену собраны`,`Риски для данных снижены`]},"bank-fraud":{id:`bank-fraud`,categoryId:`money`,title:`Подозрительный звонок из банка`,description:`Прервём разговор, защитим доступы и проверим операции.`,time:`Около 7 минут`,benefits:[{title:`Остановим давление`,text:`Без споров и проверки легенды звонящего`},{title:`Защитим доступ`,text:`Карту, приложение и учётные записи`},{title:`Проверим деньги`,text:`Операции, заявки и новые договоры`}],steps:[{id:1,title:`Завершите разговор`,duration:`Меньше минуты`,summary:`Положите трубку и ничего не подтверждайте.`,action:`Не спорьте и не пытайтесь разоблачить звонящего. Завершите разговор. Настоящий сотрудник банка не попросит назвать код из СМС, пароль или установить приложение.`,needs:[`Только ваше решение завершить звонок`],warning:`Вас торопят, запрещают класть трубку или переводят на «безопасный счёт».`,source:`Банк России: противодействие мошенничеству`,sourceUrl:`https://cbr.ru/information_security/pmp/`},{id:2,title:`Свяжитесь с банком сами`,duration:`Около 2 минут`,summary:`Используйте номер с карты или официальное приложение.`,action:`Откройте приложение банка или позвоните по номеру на обратной стороне карты. Не перезванивайте по номеру из входящего вызова и не переходите по присланным ссылкам.`,needs:[`Банковская карта`,`Официальное приложение банка`],warning:`Звонящий предлагает оставаться на линии, пока вы якобы связываетесь с банком.`,source:`Банк России: признаки телефонного мошенничества`,sourceUrl:`https://fincult.info/article/kak-bystro-raspoznat-moshennika/`},{id:3,title:`Заблокируйте доступ`,duration:`Около 2 минут`,summary:`Если сообщили данные, немедленно заблокируйте карту и смените пароль.`,action:`Сообщите банку, какие данные успели раскрыть. Заблокируйте карту при необходимости, смените пароль приложения и завершите активные сессии. Удалите программу удалённого доступа, если её установили.`,needs:[`Доступ к приложению банка`,`Другой безопасный телефон при необходимости`],warning:`На телефоне осталась неизвестная программа с доступом к экрану или уведомлениям.`,source:`Финансовая культура: что делать после передачи данных мошенникам`,sourceUrl:`https://fincult.info/article/chto-delat-esli-vy-soobshchili-moshennikam-dannye-karty/`},{id:4,title:`Проверьте операции`,duration:`Около 1 минуты`,summary:`Посмотрите списания, переводы и новые заявки.`,action:`Проверьте историю операций, лимиты, привязанные устройства и заявки на кредиты. О неизвестной операции сразу сообщите банку и следуйте его инструкции.`,needs:[`История операций`,`Уведомления банка`],warning:`Есть операция, которую вы не совершали, даже если сумма небольшая.`,source:`Банк России: безопасность банковских операций`,sourceUrl:`https://cbr.ru/information_security/pmp/`},{id:5,title:`Сохраните доказательства`,duration:`Около 2 минут`,summary:`Зафиксируйте номер, сообщения и время разговора.`,action:`Сделайте скриншоты сообщений, сохраните номер и примерное содержание разговора. Если деньги списаны или оформлен договор, обратитесь в банк и полицию, приложив эти материалы.`,needs:[`Скриншоты`,`Номер телефона`,`Выписка по операциям`],warning:`Мошенник снова связывается и обещает вернуть деньги за дополнительный платёж.`,source:`МВД России: дистанционное мошенничество`,sourceUrl:`https://cbr.ru/information_security/pmp/`}],completion:[`Разговор прекращён`,`Доступы защищены`,`Операции проверены`]},marriage:{id:`marriage`,categoryId:`family`,title:`Планируем брак`,description:`Выберем способ подачи, дату и заранее разберёмся с документами.`,time:`Около 15 минут`,benefits:[{title:`Выберем дату`,text:`С учётом доступности органа ЗАГС`},{title:`Подадим заявление`,text:`Онлайн или при личном обращении`},{title:`Продумаем документы`,text:`Фамилия и замена документов после регистрации`}],steps:[{id:1,title:`Обсудите основные решения`,duration:`Около 3 минут`,summary:`Согласуйте дату, формат регистрации и будущие фамилии.`,action:`До подачи заявления обсудите желаемую дату, торжественный или обычный формат и решение о фамилиях. Это уменьшит риск менять заявление позже.`,needs:[`Варианты дат`,`Решение о фамилиях`],warning:`Один из партнёров подаёт заявление или выбирает фамилию без согласования.`,source:`Семейный кодекс РФ, глава 3`,sourceUrl:`https://pravo.gov.ru/proxy/ips/?docbody=&nd=102038925`},{id:2,title:`Подготовьте документы`,duration:`Около 3 минут`,summary:`Проверьте паспорта и документы о прекращении прошлого брака.`,action:`Проверьте действительность паспортов. Если кто-то ранее состоял в браке, подготовьте документ, подтверждающий его прекращение, когда сведения нельзя получить автоматически.`,needs:[`Паспорта`,`Документ о прекращении прошлого брака при необходимости`],warning:`Данные в документах не совпадают или паспорт требует замены.`,source:`Госуслуги: государственная регистрация брака`,sourceUrl:`https://www.gosuslugi.ru/600105/1/form`},{id:3,title:`Подайте заявление`,duration:`Около 4 минут`,summary:`Заполните данные обоих заявителей и выберите орган ЗАГС.`,action:`Подайте совместное заявление через Госуслуги или лично. При электронной подаче каждый заявитель подтверждает свою часть из собственной учётной записи.`,needs:[`Подтверждённые учётные записи`,`Данные паспортов`,`Банковская карта для пошлины`],warning:`Посредник просит пароль от Госуслуг или код подтверждения второго заявителя.`,source:`Госуслуги: регистрация брака`,sourceUrl:`https://www.gosuslugi.ru/600105/1/form`},{id:4,title:`Проверьте подтверждение`,duration:`Около 2 минут`,summary:`Сохраните дату, место и статус заявления.`,action:`Убедитесь, что заявление принято, пошлина оплачена и дата подтверждена. Сохраните уведомление и заранее проверьте адрес и время прибытия.`,needs:[`Уведомление о приёме`,`Чек об оплате`,`Адрес органа ЗАГС`],warning:`Есть только скриншот оплаты, но нет подтверждения принятого заявления.`,source:`Госуслуги: уведомления по заявлению`,sourceUrl:`https://www.gosuslugi.ru/600105/1/form`},{id:5,title:`Составьте список замен`,duration:`Около 3 минут`,summary:`Если меняется фамилия, заранее отметьте документы и сервисы.`,action:`Составьте список документов и организаций, где потребуется обновить персональные данные. Начните с паспорта и сверяйте актуальные сроки на Госуслугах.`,needs:[`Список документов`,`Календарь`,`Доступ к Госуслугам`],warning:`После смены фамилии данные в важных договорах и банковских сервисах остаются старыми.`,source:`Госуслуги: жизненная ситуация «Смена фамилии»`,sourceUrl:`https://www.gosuslugi.ru/`}],completion:[`Решения согласованы`,`Заявление подготовлено`,`Следующие документы учтены`]},return:{id:`return`,categoryId:`purchases`,title:`Хочу вернуть товар`,description:`Проверим основание, сроки и подготовим спокойный разговор с продавцом.`,time:`Около 12 минут`,benefits:[{title:`Определим ситуацию`,text:`Товар качественный или с недостатком`},{title:`Соберём доказательства`,text:`Покупка, состояние и переписка`},{title:`Сформулируем требование`,text:`Обмен, возврат денег или ремонт`}],steps:[{id:1,title:`Определите причину возврата`,duration:`Около 2 минут`,summary:`От причины зависит срок и набор требований.`,action:`Ответьте, есть ли у товара недостаток или он просто не подошёл. Для качественного товара и товара с недостатком действуют разные правила.`,needs:[`Сам товар`,`Описание проблемы`,`Дата покупки`],warning:`Продавец убеждает, что любой вскрытый товар невозможно вернуть, не выяснив причину.`,source:`Роспотребнадзор: защита прав потребителей`,sourceUrl:`https://zpp.rospotrebnadzor.ru/`},{id:2,title:`Проверьте срок и исключения`,duration:`Около 2 минут`,summary:`Сверьте дату покупки и категорию товара.`,action:`Для качественного непродовольственного товара проверьте срок обмена и относится ли покупка к перечню исключений. Для недостатка ориентируйтесь на гарантию и характер требования.`,needs:[`Дата покупки`,`Категория товара`,`Гарантийный талон при наличии`],warning:`Вам называют внутренние правила магазина вместо норм закона.`,source:`Закон РФ «О защите прав потребителей»`,sourceUrl:`https://pravo.gov.ru/proxy/ips/?docbody=&nd=102014981`},{id:3,title:`Соберите подтверждения`,duration:`Около 2 минут`,summary:`Подготовьте чек, заказ, фото и комплект товара.`,action:`Возьмите чек или другое подтверждение покупки: банковскую операцию, электронный заказ, гарантийный талон. Сфотографируйте недостаток и сохраните упаковку и комплектность, если они есть.`,needs:[`Чек или выписка`,`Фото недостатка`,`Комплект товара`],warning:`Отказ объясняют только отсутствием бумажного чека.`,source:`Закон о защите прав потребителей, статья 18`,sourceUrl:`https://pravo.gov.ru/proxy/ips/?docbody=&nd=102014981`},{id:4,title:`Сформулируйте требование`,duration:`Около 3 минут`,summary:`Выберите одно понятное требование и изложите его письменно.`,action:`Укажите товар, дату покупки, обстоятельства и конкретное требование. Подготовьте два экземпляра претензии: один передайте продавцу, на втором попросите поставить отметку о приёме.`,needs:[`Данные продавца`,`Описание покупки`,`Два экземпляра претензии`],warning:`Сотрудник забирает единственный экземпляр заявления без отметки о приёме.`,source:`Роспотребнадзор: подача претензии продавцу`,sourceUrl:`https://zpp.rospotrebnadzor.ru/`},{id:5,title:`Зафиксируйте результат`,duration:`Около 3 минут`,summary:`Сохраните заявление, ответ и документы о передаче товара.`,action:`Запишите дату обращения и сохраните подтверждение передачи товара. При споре запросите письменный ответ. Если продавец не реагирует, используйте консультационный ресурс Роспотребнадзора или обратитесь за правовой помощью.`,needs:[`Копия претензии`,`Акт приёма товара`,`Ответ продавца`],warning:`Товар забрали на проверку без документа с датой, состоянием и комплектностью.`,source:`Государственный информационный ресурс в сфере защиты прав потребителей`,sourceUrl:`https://zpp.rospotrebnadzor.ru/`}],completion:[`Основание проверено`,`Претензия подготовлена`,`Обращение зафиксировано`]}},Ee=[{Icon:ye,title:`Проверенные источники`,text:`Каждый маршрут содержит ссылку на первоисточник.`},{Icon:ge,title:`Понятные действия`,text:`Не теория, а следующий конкретный шаг.`},{Icon:pe,title:`Официальные сервисы`,text:`Переходите в нужный сервис уже подготовленным.`},{Icon:Se,title:`Без лишних данных`,text:`Мы не просим загружать документы в демоверсии.`},{Icon:xe,title:`Границы помощи`,text:`Подскажем, когда лучше обратиться к специалисту.`}],De=o((e=>{var t=u(),n=Symbol.for(`react.element`),r=Symbol.for(`react.fragment`),i=Object.prototype.hasOwnProperty,a=t.__SECRET_INTERNALS_DO_NOT_USE_OR_YOU_WILL_BE_FIRED.ReactCurrentOwner,o={key:!0,ref:!0,__self:!0,__source:!0};function s(e,t,r){var s,c={},l=null,u=null;for(s in r!==void 0&&(l=``+r),t.key!==void 0&&(l=``+t.key),t.ref!==void 0&&(u=t.ref),t)i.call(t,s)&&!o.hasOwnProperty(s)&&(c[s]=t[s]);if(e&&e.defaultProps)for(s in t=e.defaultProps,t)c[s]===void 0&&(c[s]=t[s]);return{$$typeof:n,type:e,key:l,ref:u,props:c,_owner:a.current}}e.Fragment=r,e.jsx=s,e.jsxs=s})),O=o(((e,t)=>{t
